<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">Task<span>Flow</span></div>
      <p class="auth-subtitle">Create your account</p>

      <div id="reg-alert" class="alert"></div>

      <form id="register-form" autocomplete="off">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Jane Doe" required minlength="2" maxlength="50" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn btn-primary" data-label="Create Account">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign in →</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem("tf_token")) window.location.href = "dashboard.html";
  </script>
</body>
</html>
