<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">Task<span>Flow</span></div>
      <p class="auth-subtitle">Sign in to manage your tasks</p>

      <div id="login-alert" class="alert"></div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" data-label="Sign In">Sign In</button>
      </form>

      <div class="auth-footer">
        No account? <a href="register.html">Create one →</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem("tf_token")) window.location.href = "dashboard.html";
  </script>
</body>
</html>
